- name: detect Debian architecture
  command: dpkg --print-architecture
  register: devtools_dpkg_arch
  changed_when: false

- name: install Docker signing key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.asc
    mode: "0644"

- name: dearmor Docker signing key
  shell: gpg --dearmor --yes --output /usr/share/keyrings/docker.gpg /tmp/docker.asc
  args:
    creates: /usr/share/keyrings/docker.gpg

- name: add Docker repository
  apt_repository:
    repo: "deb [arch={{ devtools_dpkg_arch.stdout }} signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
    update_cache: yes

- name: install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: add user to docker group
  user:
    name: "{{ ansible_env.SUDO_USER | default(ansible_user_id, true) }}"
    groups: docker
    append: yes

- name: remove Docker signing key temp file
  file:
    path: /tmp/docker.asc
    state: absent
