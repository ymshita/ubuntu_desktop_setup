- name: apt update
  apt:
    update_cache: yes

- name: install base packages
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - unattended-upgrades
    state: present

- name: enable unattended-upgrades
  command: dpkg-reconfigure -f noninteractive unattended-upgrades
  changed_when: false
